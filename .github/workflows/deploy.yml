name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'apps/web/**'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/web

    permissions:
      contents: read
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - run: npm ci

      - run: npm run build
        env:
          VITE_SUPABASE_URL: https://ounomznpqtuqyadhnlgh.supabase.co
          VITE_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im91bm9tem5wcXR1cXlhZGhubGdoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE3OTYwNzcsImV4cCI6MjA5NzM3MjA3N30.te16XVBF4cZ96b5fGJt_FKEKXYI6dTSbBWbwrCymb5Q

      - uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
